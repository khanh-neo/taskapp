name: Auto Generate

on:
  push:
    branches:
      - master

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Trigger with Job Token
        run: |
          echo "Triggered!"
        env:
          JOB_TOKEN: ${{ secrets.CODELEDGE }}